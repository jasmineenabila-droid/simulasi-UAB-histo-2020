<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAB Histologi 2020 - Latihan Soal Interaktif</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #2ecc71;
            --fail-color: #e74c3c;
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #dcdde1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            padding: 30px;
            position: relative;
        }

        header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 24px;
            color: var(--primary-color);
        }

        header p {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .progress-bar-container {
            background: #e2e8f0;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .progress-bar {
            background: var(--secondary-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-card {
            display: none;
        }

        .question-card.active {
            display: block;
        }

        .question-header {
            font-size: 15px;
            font-weight: bold;
            color: var(--secondary-color);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .question-text {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #1a252f;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-item {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-item:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        .option-item.selected {
            border-color: var(--secondary-color);
            background: #e0f2fe;
        }

        .option-item input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
            accent-color: var(--secondary-color);
            cursor: pointer;
        }

        .option-text {
            font-size: 15px;
            font-weight: 500;
        }

        /* Feedback Styles setelah koreksi ditekan */
        .option-item.correct-ans {
            background: #dcfce7 !important;
            border-color: var(--success-color) !important;
            color: #14532d;
        }

        .option-item.wrong-ans {
            background: #fee2e2 !important;
            border-color: var(--fail-color) !important;
            color: #7f1d1d;
        }

        .explanation-box {
            display: none;
            margin-top: -15px;
            margin-bottom: 25px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .explanation-box.show {
            display: block;
        }

        .explanation-box.correct {
            background: #e8f8f5;
            color: var(--success-color);
            border-left: 4px solid var(--success-color);
        }

        .explanation-box.wrong {
            background: #fdedec;
            color: var(--fail-color);
            border-left: 4px solid var(--fail-color);
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
        }

        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-prev {
            background: #94a3b8;
            color: white;
        }

        .btn-prev:hover:not(:disabled) {
            background: #64748b;
        }

        .btn-check {
            background: var(--primary-color);
            color: white;
        }

        .btn-check:hover:not(:disabled) {
            background: #1e293b;
        }

        .btn-next {
            background: var(--secondary-color);
            color: white;
        }

        .btn-next:hover:not(:disabled) {
            background: #2563eb;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Layar Hasil Akhir */
        .results-screen {
            display: none;
            text-align: center;
            padding: 30px 0;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #f0fdf4;
            border: 5px solid var(--success-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 25px auto;
        }

        .summary-table {
            width: 100%;
            margin: 25px 0;
            border-collapse: collapse;
            font-size: 15px;
        }

        .summary-table th, .summary-table td {
            padding: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .summary-table th {
            background: #f8fafc;
        }
    </style>
</head>

    // Mengacak susunan pilihan jawaban (shuffling) tanpa merusak nilai kunci
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // Bangun struktur data komparasi final
    const questions = rawQuestions.map((item, index) => {
        const shuffledOptions = shuffleArray([...item.options]);
        return {
            id: index + 1,
            q: item.q,
            options: shuffledOptions,
            correct: item.correct,
            userSelection: null,
            isCorrect: null,
            checked: false
        };
    });

    let currentIdx = 0;

    // Render komponen ke antarmuka DOM
    const wrapper = document.getElementById('quiz-wrapper');
    questions.forEach((item, qIdx) => {
        const card = document.createElement('div');
        card.className = `question-card ${qIdx === 0 ? 'active' : ''}`;
        card.id = `qcard-${qIdx}`;

        let optionsHTML = '';
        item.options.forEach((opt, oIdx) => {
            optionsHTML += `
                <div class="option-item" id="opt-container-${qIdx}-${oIdx}" onclick="selectOption(${qIdx}, ${oIdx}, '${opt.replace(/'/g, "\\'")}')">
                    <input type="radio" name="q-opt-${qIdx}" id="radio-${qIdx}-${oIdx}" value="${opt}">
                    <span class="option-text"><b>${String.fromCharCode(65 + oIdx)}.</b> ${opt}</span>
                </div>
            `;
        });

        card.innerHTML = `
            <div class="question-header">Soal Nomor ${item.id} dari 50</div>
            <div class="question-text">${item.q}</div>
            <div class="options-container">${optionsHTML}</div>
            <div class="explanation-box" id="explain-${qIdx}"></div>
        `;
        wrapper.appendChild(card);
    });

    function updateProgressBar() {
        const pct = ((currentIdx + 1) / questions.length) * 100;
        document.getElementById('progress-bar').style.width = `${pct}%`;
    }

    function selectOption(qIdx, oIdx, textValue) {
        if (questions[qIdx].checked) return; // Kunci input jika sudah dicek

        questions[qIdx].userSelection = textValue;

        // Reset highlight elemen pilihan lain dalam satu nomor
        const siblings = document.querySelectorAll(`#qcard-${qIdx} .option-item`);
        siblings.forEach(el => el.classList.remove('selected'));

        // Aktifkan tanda visual item terpilih
        document.getElementById(`opt-container-${qIdx}-${oIdx}`).classList.add('selected');
        document.getElementById(`radio-${qIdx}-${oIdx}`).checked = true;
    }

    function checkCurrentAnswer() {
        const currentData = questions[currentIdx];
        if (currentData.checked) return;

        if (!currentData.userSelection) {
            alert("Silakan pilih salah satu jawaban terlebih dahulu sebelum menekan tombol Cek Jawaban.");
            return;
        }

        currentData.checked = true;
        const isCorrect = (currentData.userSelection === currentData.correct);
        currentData.isCorrect = isCorrect;

        // Beri warna klasifikasi indikator jawaban (Benar / Salah) pada DOM
        currentData.options.forEach((opt, oIdx) => {
            const optEl = document.getElementById(`opt-container-${currentIdx}-${oIdx}`);
            optEl.classList.remove('selected');
            
            if (opt === currentData.correct) {
                optEl.classList.add('correct-ans');
            } else if (opt === currentData.userSelection && !isCorrect) {
                optEl.classList.add('wrong-ans');
            }
        });

        // Tampilkan kotak status penjelasan singkat di bawah pilihan
        const expBox = document.getElementById(`explain-${currentIdx}`);
        if (isCorrect) {
            expBox.className = "explanation-box show correct";
            expBox.innerHTML = `✓ <b>Jawaban Anda Benar!</b><br>Kunci: ${currentData.correct}`;
        } else {
            expBox.className = "explanation-box show wrong";
            expBox.innerHTML = `✗ <b>Jawaban Anda Kurang Tepat.</b><br>Kunci yang benar adalah: <b>${currentData.correct}</b>`;
        }

        document.getElementById('btn-check').disabled = true;
    }

    function navigateQuestion(step) {
        document.getElementById(`qcard-${currentIdx}`).classList.remove('active');
        currentIdx += step;

        if (currentIdx >= questions.length) {
            evaluateFinalScore();
            return;
        }

        document.getElementById(`qcard-${currentIdx}`).classList.add('active');
        
        // Atur status keterbentukan tombol kontrol navigasi
        document.getElementById('btn-prev').disabled = (currentIdx === 0);
        
        const checkBtn = document.getElementById('btn-check');
        if (questions[currentIdx].checked) {
            checkBtn.disabled = true;
        } else {
            checkBtn.disabled = false;
        }

        if (currentIdx === questions.length - 1) {
            document.getElementById('btn-next').innerText = "Finish";
        } else {
            document.getElementById('btn-next').innerText = "Next";
        }

        updateProgressBar();
    }

    function evaluateFinalScore() {
        document.getElementById('quiz-wrapper').style.display = 'none';
        document.getElementById('controls-wrapper').style.display = 'none';
        document.getElementById('progress-container').style.display = 'none';
        document.getElementById('quiz-header').style.display = 'none';

        let correctCount = 0;
        let wrongCount = 0;

        questions.forEach(item => {
            if (item.isCorrect) correctCount++;
            else wrongCount++;
        });

        const accuracy = Math.round((correctCount / questions.length) * 100);

        document.getElementById('results-wrapper').style.display = 'block';
        document.getElementById('final-score').innerText = `${accuracy}`;
        document.getElementById('res-correct').innerText = correctCount;
        document.getElementById('res-wrong').innerText = wrongCount;
        document.getElementById('res-accuracy').innerText = `${accuracy}%`;
    }

    function restartQuiz() {
        location.reload();
    }

    // Inisialisasi awal progress bar saat aplikasi pertama kali dimuat
    updateProgressBar();
</script>
